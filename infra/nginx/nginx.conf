# API Gateway — routes requests by path prefix to the right service.
# /catalog/*   → catalog-service
# /order/*     → order-service
# /payment/*   → payment-service
# /cart/*      → cart-service
# /review/*    → review-service
# /promotion/* → promotion-service
# /media/*     → media-service
#
# Each upstream is the docker-compose service name on the internal network.

worker_processes auto;
events { worker_connections 1024; }

http {
    # Logging (JSON for structured log shipping)
    log_format json escape=json
        '{"ts":"$time_iso8601","status":$status,"method":"$request_method",'
        '"uri":"$request_uri","upstream":"$upstream_addr",'
        '"rt":$request_time,"ut":"$upstream_response_time","ua":"$http_user_agent"}';
    access_log /dev/stdout json;
    error_log  /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;

    upstream catalog_upstream   { server catalog-service:8081; }
    upstream order_upstream     { server order-service:8082; }
    upstream payment_upstream   { server payment-service:8083; }
    upstream cart_upstream      { server cart-service:8084; }
    upstream review_upstream    { server review-service:8086; }
    upstream promotion_upstream { server promotion-service:8087; }
    upstream media_upstream     { server media-service:8088; }

    server {
        listen 80 default_server;
        server_name _;

        # ── Health for the gateway itself ────────────────────
        location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

        # ── Service routes (strip the /<svc> prefix) ─────────
        location /catalog/ {
            rewrite ^/catalog/(.*)$ /$1 break;
            proxy_pass         http://catalog_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /order/ {
            rewrite ^/order/(.*)$ /$1 break;
            proxy_pass         http://order_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /payment/ {
            rewrite ^/payment/(.*)$ /$1 break;
            proxy_pass         http://payment_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /cart/ {
            rewrite ^/cart/(.*)$ /$1 break;
            proxy_pass         http://cart_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /review/ {
            rewrite ^/review/(.*)$ /$1 break;
            proxy_pass         http://review_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /promotion/ {
            rewrite ^/promotion/(.*)$ /$1 break;
            proxy_pass         http://promotion_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /media/ {
            rewrite ^/media/(.*)$ /$1 break;
            proxy_pass         http://media_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Friendly root.
        location = / {
            default_type application/json;
            return 200 '{"service":"ecom-gateway","routes":["/catalog/","/order/","/payment/","/cart/","/review/","/promotion/","/media/"]}';
        }
    }
}
