# Apply everything with:  kubectl apply -k infra/k8s
# Override image tags per environment without editing the Deployments, e.g.:
#   kustomize edit set image ecom/catalog-service=ghcr.io/org/catalog:v1.2.3
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ecom
resources:
  - 00-namespace.yaml
  - 10-config.yaml
  - 20-redis.yaml
  - 30-postgres.yaml
  - 40-catalog.yaml
  - 41-order.yaml
  - 42-payment.yaml
  - 50-ingress.yaml
images:
  - name: ecom/catalog-service
    newTag: latest
  - name: ecom/order-service
    newTag: latest
  - name: ecom/payment-service
    newTag: latest
