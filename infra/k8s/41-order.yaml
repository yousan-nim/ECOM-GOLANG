# order-service — stateless, horizontally scalable. See 40-catalog.yaml for the
# annotated reference; this differs only in port, DB, and peer service URLs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecom
  labels: { app: order-service }
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: order
          image: ecom/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8082 }
          env:
            - { name: HTTP_PORT, value: "8082" }
            - { name: DB_HOST, value: postgres-order }
            - { name: DB_NAME, value: order_db }
            - { name: DB_USER, valueFrom: { secretKeyRef: { name: ecom-secrets, key: ORDER_DB_USER } } }
            - { name: DB_PASSWORD, valueFrom: { secretKeyRef: { name: ecom-secrets, key: ORDER_DB_PASSWORD } } }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: ecom-secrets, key: JWT_SECRET } } }
            - { name: REDIS_PASSWORD, valueFrom: { secretKeyRef: { name: ecom-secrets, key: REDIS_PASSWORD } } }
            - { name: CATALOG_BASE_URL, value: http://catalog-service:8081 }
            - { name: PAYMENT_BASE_URL, value: http://payment-service:8083 }
          envFrom:
            - configMapRef: { name: ecom-config }
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecom
  labels: { app: order-service }
spec:
  selector: { app: order-service }
  ports:
    - { name: http, port: 8082, targetPort: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service
  namespace: ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: order-service
  namespace: ecom
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: order-service }
