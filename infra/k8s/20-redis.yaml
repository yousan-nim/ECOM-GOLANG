# Redis — shared cache-aside layer (pkg/cache).
#
# Single replica with an LRU eviction policy and no persistence: the cache is
# rebuildable from the source-of-truth databases, so we optimise for memory and
# speed, not durability. A cold Redis just causes a brief miss storm, never data
# loss. For HA later, swap this for the Redis Operator or a managed Redis
# (ElastiCache / MemoryStore) and keep the Service name "redis".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ecom
  labels: { app: redis }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # redis user in the official image
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "768mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "1Gi" }
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ecom
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
